<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5bbdd6"/>
      <stop offset="50%" stop-color="#b8aaed"/>
      <stop offset="100%" stop-color="#f5a7c7"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="512" height="512" rx="112" ry="112" fill="white" opacity="0.08"/>
  <!-- Music note body -->
  <ellipse cx="180" cy="340" rx="52" ry="38" fill="url(#wave)" opacity="0.92"/>
  <!-- Music note stem -->
  <rect x="224" y="172" width="18" height="174" rx="9" fill="url(#wave)" opacity="0.92"/>
  <!-- Music note flag -->
  <path d="M242 172 Q330 155 338 230 Q310 210 242 228 Z" fill="url(#wave)" opacity="0.92"/>
  <!-- Sound waves left -->
  <path d="M118 210 Q88 256 118 302" stroke="white" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M80 176 Q32 256 80 336" stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Sound waves right -->
  <path d="M306 235 Q326 256 306 277" stroke="white" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M334 210 Q370 256 334 302" stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M364 180 Q414 256 364 332" stroke="white" stroke-width="10" stroke-linecap="round" fill="none" opacity="0.3"/>
</svg>
